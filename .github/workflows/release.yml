name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            build_script: dist:mac
            artifact_name: release-macos
            upload_glob: dist/australian-library-browser-*-mac-*.zip
          - os: ubuntu-latest
            build_script: dist:linux
            artifact_name: release-linux
            upload_glob: dist/australian-library-browser-*-linux.AppImage
          - os: windows-latest
            build_script: dist:win
            artifact_name: release-windows
            upload_glob: dist/australian-library-browser-*-windows.exe

    runs-on: ${{ matrix.os }}

    env:
      CSC_IDENTITY_AUTO_DISCOVERY: "false"
      GH_TOKEN: ${{ github.token }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - if: runner.os == 'Linux'
        run: npx playwright install --with-deps chromium

      - if: runner.os != 'Linux'
        run: npx playwright install chromium

      - run: npm run test:fixtures

      - run: npm run test:mcp

      - run: npm run ${{ matrix.build_script }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.upload_glob }}
          if-no-files-found: error

  publish:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Write release notes
        run: |
          cat > release-notes.md <<'EOF'
          Desktop app for collecting material from Trove and SLWA into self-describing research libraries on disk.

          Download one file for your platform:

          - macOS: `australian-library-browser-<version>-mac-arm64.zip`
          - Windows: `australian-library-browser-<version>-windows.exe`
          - Linux: `australian-library-browser-<version>-linux.AppImage`

          The app saves markdown, images, and metadata into a normal local folder so the material can be searched and worked across later.

          If you want to run it from source instead:

          ```bash
          npm install
          npm start
          ```
          EOF

      - uses: softprops/action-gh-release@v2
        with:
          files: release-assets/**/*
          body_path: release-notes.md
